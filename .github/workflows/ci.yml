name: CI
on:
  push:
  pull_request:
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        target:
        - native
        - x86-windows
        - aarch64-windows
        - aarch64-macos
        - arm-linux-gnueabi
        - powerpc64-openbsd
        - riscv64-freebsd
        - wasm32-freestanding
    runs-on: ubuntu-latest
    env:
      build: zig build -Dtarget=${{ matrix.target }} ${{ matrix.target == 'wasm32-freestanding' && '-Dcpu=bleeding_edge' || '' }} ${{ matrix.target == 'native' && '-fsys=wio' || '' }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Set up Zig
      uses: mlugg/setup-zig@v2
      with:
        cache-key: ${{ matrix.target }}
    - if: ${{ matrix.target == 'native' }}
      name: Install packages
      uses: awalsh128/cache-apt-pkgs-action@v1
      with:
        packages: xwayland-run libx11-dev libxcursor-dev libglvnd-dev libwayland-dev libxkbcommon-dev libdecor-0-dev libvulkan-dev libxext-dev libudev-dev libpulse-dev
    - name: Build demo
      working-directory: demo
      run: ${{ env.build }}
    - name: Build framebuffer example
      working-directory: examples/framebuffer
      run: ${{ env.build }}
    - if: ${{ matrix.target == 'native' }}
      name: Run framebuffer example (X11)
      run: test "$(xvfb-run timeout 10 examples/framebuffer/zig-out/bin/framebuffer >stdout; echo $?; cat stdout >&2)" -eq 124
    - if: ${{ matrix.target == 'native' }}
      name: Run framebuffer example (Wayland)
      run: test "$(wlheadless-run -- timeout 10 examples/framebuffer/zig-out/bin/framebuffer; echo $?)" -eq 124
    - if: ${{ matrix.target != 'wasm32-freestanding' }}
      name: Build Vulkan example
      working-directory: examples/vulkan
      run: ${{ env.build }}
    - if: ${{ endsWith(matrix.target, '-windows') }}
      name: Build D3D11 example
      working-directory: examples/d3d11
      run: ${{ env.build }}
    - if: ${{ endsWith(matrix.target, '-macos') }}
      name: Build Metal example
      working-directory: examples/metal
      run: ${{ env.build }}
  build_android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Set up Zig
      uses: mlugg/setup-zig@v2
    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: "temurin"
    - name: Set up Android SDK
      uses: android-actions/setup-android@v4
      with:
        packages: "build-tools;37.0.0 ndk;29.0.14206865 platforms;android-35 platforms;android-26"
    - name: Build demo
      working-directory: demo
      run: zig build -Dandroid=true
    - name: Build framebuffer example
      working-directory: examples/framebuffer
      run: zig build -Dandroid=true
    - name: Build Vulkan example
      working-directory: examples/vulkan
      run: zig build -Dandroid=true
    - name: Build demo for API level 26
      working-directory: demo
      run: zig build -Dandroid=true -Dandroid_api_level=android8
    - name: Build framebuffer example for API level 26
      working-directory: examples/framebuffer
      run: zig build -Dandroid=true -Dandroid_api_level=android8
    - name: Build Vulkan example for API level 26
      working-directory: examples/vulkan
      run: zig build -Dandroid=true -Dandroid_api_level=android8
