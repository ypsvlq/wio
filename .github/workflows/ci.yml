name: CI
on:
  push:
  pull_request:
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        target:
        - aarch64-windows
        - aarch64-macos
        - arm-linux-gnueabi
        - mips-netbsd
        - riscv64-freebsd
        - wasm32-freestanding
        - native
    runs-on: ubuntu-latest
    env:
      build: zig build -Dtarget=${{ matrix.target }} ${{ matrix.target == 'native' && '-fsys=wio' || '' }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Set up Zig
      uses: mlugg/setup-zig@v2
      with:
        cache-key: ${{ matrix.target }}
    - if: ${{ matrix.target == 'native' }}
      name: Install packages
      uses: awalsh128/cache-apt-pkgs-action@v1
      with:
        packages: xwayland-run libx11-dev libxcursor-dev libglvnd-dev libwayland-dev libxkbcommon-dev libdecor-0-dev libvulkan-dev libudev-dev libpulse-dev
    - name: Build demo
      working-directory: demo
      run: ${{ env.build }}
    - if: ${{ matrix.target != 'wasm32-freestanding' }}
      name: Build framebuffer example
      working-directory: examples/framebuffer
      run: ${{ env.build }}
    - if: ${{ matrix.target == 'native' }}
      name: Run framebuffer example (Wayland)
      run: test "$(wlheadless-run -- timeout 10 examples/framebuffer/zig-out/bin/framebuffer; echo $?)" -eq 124
    - if: ${{ matrix.target != 'wasm32-freestanding' }}
      name: Build Vulkan example
      working-directory: examples/vulkan
      run: ${{ env.build }}
    - if: ${{ endsWith(matrix.target, '-windows') }}
      name: Build D3D11 example
      working-directory: examples/d3d11
      run: ${{ env.build }}
